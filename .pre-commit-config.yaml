repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.6
    hooks:
      - id: ruff
        args: [ --fix ]
        files: '^(src/.*\.py|main\.py)$'
      - id: ruff-format
        files: '^(src/.*\.py|main\.py)$'

  - repo: https://github.com/crate-ci/typos
    rev: v1.32.0
    hooks:
      - id: typos

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: uv\.lock

  - repo: local
    hooks:
      - id: vulture
        name: vulture (dead code)
        entry: uv run vulture src main.py --min-confidence 80
        language: system
        types: [python]
        pass_filenames: false
      - id: ty
        name: ty type check
        entry: uv run ty check src
        language: system
        types: [python]
        files: 'src/.*\.py$'
        pass_filenames: false
      - id: fast-tests
        name: fast unit tests (no slow/IO)
        entry: uv run pytest -m "not slow" --no-cov
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      - id: pip-audit
        name: pip-audit (security scan)
        entry: uv run pip-audit
        language: system
        pass_filenames: false
        files: 'uv\.lock|pyproject\.toml'
