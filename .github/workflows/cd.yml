name: CD

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Verify CI passed on tagged commit
        run: |
          gh run list \
            --commit ${{ github.sha }} \
            --workflow ci.yml \
            --status completed \
            --json conclusion \
            --jq 'if length == 0 then error("CI has not run on this commit") elif any(.[]; .conclusion == "success") then "CI passed" else error("CI has not passed on this commit") end'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v1
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build package
        run: uv build

      - name: Verify package installable
        run: |
          uv venv /tmp/verify-env
          uv pip install --python /tmp/verify-env/bin/python dist/*.whl
          PACKAGE=$(ls dist/*.whl | head -1 | xargs basename | cut -d'-' -f1)
          /tmp/verify-env/bin/python -c "import $PACKAGE; print('Import OK')"

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$UV_PUBLISH_TOKEN" ]; then
            echo "⚠️  PYPI_API_TOKEN 未设置，跳过 PyPI 发布"
            echo "如需发布到 PyPI，请在仓库设置中添加 PYPI_API_TOKEN secret"
          else
            uv publish --token "$UV_PUBLISH_TOKEN"
          fi

      - name: Create GitHub Release
        run: |
          gh release create ${{ steps.version.outputs.version }} \
            dist/*.whl dist/*.tar.gz \
            --title "Release ${{ steps.version.outputs.version }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
